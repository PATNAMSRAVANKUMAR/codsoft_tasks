<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODSOFT Projects</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
text-align:center;
}

h1{
font-size:45px;
margin-bottom:10px;
}

p{
margin-bottom:40px;
color:#ddd;
}

.cards{
display:flex;
gap:30px;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
color:#333;
padding:25px;
width:280px;
border-radius:15px;
box-shadow:0 15px 25px rgba(0,0,0,.4);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card h2{
margin-bottom:15px;
}

.card p{
color:#666;
}

a{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

a:hover{
background:#1d4ed8;
}

</style>

</head>
<body>

<div class="container">

<h1>CODSOFT Web Development Projects</h1>

<p>Created by <b>Patnam Sravan Kumar</b></p>

<div class="cards">

<div class="card">
<h2>Task 1</h2>
<p>Personal Portfolio Website</p>
<a href="Task1-Portfolio/">Open Project</a>
</div>

<div class="card">
<h2>Task 2</h2>
<p>Responsive Landing Page</p>
<a href="Task2-Landing-page/">Open Project</a>
</div>

<div class="card">
<h2>Task 3</h2>
<p>JavaScript Calculator</p>
<a href="Task3-Calculator/">Open Project</a>
</div>

</div>

</div>

</body>
</html>
